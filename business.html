<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İşletme Detayı — Rezora</title>
  <meta name="description" content="İşletme detayları, hizmetler, müsait tarih ve saatler, müşteri yorumları ve online rezervasyon.">
  <link rel="icon" href="assets/img/rezora-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main>
    <section class="container" style="padding-top:24px">
      <div class="breadcrumb">
        <a href="index.html">Ana sayfa</a> <span>›</span>
        <a href="businesses.html">İşletmeler</a> <span>›</span>
        <span id="bcName"></span>
      </div>
    </section>

    <!-- Gallery -->
    <section class="container">
      <div class="gallery" id="gallery"></div>
    </section>

    <!-- Header -->
    <section class="container" style="padding:26px 0 0">
      <div class="flex items-center justify-between flex-wrap gap-16">
        <div>
          <div class="flex items-center gap-12 flex-wrap" style="margin-bottom:10px">
            <span class="badge badge-purple" id="hCat"></span>
            <span class="badge badge-green"><span class="dot"></span> Şu an açık</span>
          </div>
          <h1 id="hName" style="font-size:clamp(2rem,4vw,2.6rem)"></h1>
          <div class="flex items-center gap-16 flex-wrap" style="margin-top:12px">
            <span class="rating" id="hRating"></span>
            <span class="biz-meta" id="hLoc"></span>
          </div>
        </div>
        <div class="flex gap-12">
          <button class="btn btn-ghost" onclick="toast('Favorilere eklendi','ok')">♡ Kaydet</button>
          <button class="btn btn-ghost" onclick="toast('Bağlantı kopyalandı','ok')">↗ Paylaş</button>
        </div>
      </div>
    </section>

    <!-- Detail grid -->
    <section class="container section" style="padding-top:30px">
      <div class="detail-grid">
        <!-- LEFT -->
        <div>
          <div class="detail-section" style="border-top:none;padding-top:0">
            <h3>Hakkında</h3>
            <p class="muted" id="hDesc" style="font-size:1.05rem;line-height:1.7"></p>
            <div class="grid gap-12" style="grid-template-columns:repeat(2,1fr);margin-top:18px" id="infoRows"></div>
          </div>

          <div class="detail-section">
            <h3>Hizmetler</h3>
            <p class="muted" style="margin-bottom:16px">Bir hizmet seç, sağ taraftan tarih ve saatini ayarla.</p>
            <div class="svc-list" id="svcList"></div>
          </div>

          <div class="detail-section">
            <h3>Müsait Tarihler</h3>
            <div class="date-row" id="dateRow" style="margin-top:6px"></div>
          </div>

          <div class="detail-section">
            <h3>Müsait Saatler</h3>
            <p class="muted" id="timeHint" style="margin-bottom:14px">Önce bir tarih seçin.</p>
            <div class="time-row" id="timeRow"></div>
          </div>

          <div class="detail-section" style="border-bottom:none">
            <div class="flex items-center justify-between" style="margin-bottom:8px">
              <h3>Müşteri Yorumları</h3>
              <span class="rating" id="rvSummary"></span>
            </div>
            <div id="reviews"></div>
          </div>
        </div>

        <!-- RIGHT sticky -->
        <div>
          <div class="sticky-card">
            <div class="flex items-center justify-between">
              <div>
                <div class="muted" style="font-size:.85rem">Başlangıç fiyatı</div>
                <div style="font-family:var(--font-head);font-weight:800;font-size:1.6rem" id="cardPrice"></div>
              </div>
              <span class="rating" id="cardRating"></span>
            </div>
            <hr style="border:none;border-top:1px solid var(--gray-200)">
            <div class="summary-box" style="background:var(--gray-50);border-color:var(--gray-200)">
              <div class="summary-row"><span class="k">Hizmet</span><span class="v" id="sumSvc">—</span></div>
              <div class="summary-row"><span class="k">Tarih</span><span class="v" id="sumDate">—</span></div>
              <div class="summary-row"><span class="k">Saat</span><span class="v" id="sumTime">—</span></div>
            </div>
            <button class="btn btn-primary btn-block btn-lg" id="continueBtn" disabled>Rezervasyona devam et</button>
            <p class="muted center" style="font-size:.82rem">Ödeme yok · Onay WhatsApp & SMS ile</p>
            <div class="flex items-center gap-8" style="justify-content:center;color:var(--gray-500);font-size:.82rem">
              <span style="color:var(--purple-600)">✓</span> Anında onay · Ücretsiz iptal
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    initLayout("detail");
    rezoraConfigBanner();

    const sel = { service: null, dateIso: null, dateLabel: null, time: null };
    let curIntervals = [];
    function svcPrice(s){ return (s.price===null||s.price===undefined||s.price==="") ? null : s.price; }

    (async()=>{
    const all = await Rezora.getBusinesses();
    const b = (await Rezora.getBusiness(qparam("id"))) || all[0];
    if(!b){
      document.getElementById("hName").textContent = "İşletme bulunamadı";
      buildFooter(); return;
    }

    document.title = b.name + " — Rezora";
    document.getElementById("bcName").textContent = b.name;
    document.getElementById("hName").textContent = b.name;
    document.getElementById("hCat").textContent = b.categoryName;
    document.getElementById("hRating").innerHTML = `<span class="stars">★</span> ${b.rating} <span class="count">(${b.reviews} değerlendirme)</span>`;
    document.getElementById("hLoc").innerHTML = `${ICON.pin} ${b.city} · ${b.area||""}`;
    document.getElementById("hDesc").textContent = b.desc;
    const startP = Rezora.startingPrice(b);
    document.getElementById("cardPrice").textContent = startP!==null ? money(startP) : "Fiyat işletmede";
    document.getElementById("cardRating").innerHTML = `<span class="stars">★</span> ${b.rating}`;

    // gallery
    const gimgs = (b.gallery && b.gallery.length ? b.gallery : [b.img,b.img,b.img,b.img,b.img]);
    document.getElementById("gallery").innerHTML = gimgs.slice(0,5).map((g,i)=>
      `<div class="g g${i}" style="${imgStyle(g, i===0?900:500)}"></div>`).join("");

    // working hours text
    const dayNames = (b.workingDays||[1,2,3,4,5,6]).map(d=>TR_DAYS[d]).join(", ");
    const info = [
      {ic:"clock", t:"Çalışma saatleri", v:`${dayNames} · ${b.openTime} - ${b.closeTime}`},
      {ic:"pin", t:"Konum", v:`${b.area||''}, ${b.city}`},
      {ic:"phone", t:"Telefon", v:b.phone || "—"},
      {ic:"shield", t:"Doğrulanmış işletme", v:"Rezora Onaylı ✓"},
    ];
    document.getElementById("infoRows").innerHTML = info.map(r=>`
      <div class="info-row">${ICON[r.ic]}<div><div class="ir-t">${r.t}</div><div class="ir-v">${r.v}</div></div></div>`).join("");

    // services (price hidden when null)
    const services = b.services || [];
    function renderServices(){
      document.getElementById("svcList").innerHTML = services.map(s=>{
        const p = svcPrice(s);
        return `
        <div class="svc-item ${sel.service===s.id?'selected':''}" data-svc="${s.id}">
          <div>
            <div class="svc-name">${s.name} ${s.popular?'<span class="badge badge-purple" style="margin-left:6px">En popüler</span>':''}</div>
            <div class="svc-dur">⏱ ${s.dur} dk</div>
          </div>
          <div class="svc-price">${p!==null ? money(p) : '<span class="muted" style="font-size:.82rem;font-weight:600">Fiyatı sor</span>'}</div>
        </div>`;
      }).join("");
      document.querySelectorAll(".svc-item").forEach(el=>el.addEventListener("click",()=>{
        sel.service = el.dataset.svc; renderServices(); renderTimes(); updateSummary();
      }));
    }
    renderServices();

    function selDur(){ const s = svcById(sel.service); return s ? s.dur : b.slotMinutes; }

    // dates (only working days enabled)
    const dates = genDates(14, b.workingDays);
    document.getElementById("dateRow").innerHTML = dates.map(d=>`
      <button class="date-pill ${d.disabled?'disabled':''}" data-iso="${d.iso}" data-label="${d.key}" ${d.disabled?'disabled':''}>
        <div class="dp-day">${d.day}</div>
        <div class="dp-num">${d.num}</div>
        <div class="dp-mon">${d.mon}</div>
      </button>`).join("");
    document.querySelectorAll(".date-pill:not(.disabled)").forEach(el=>el.addEventListener("click",async ()=>{
      sel.dateIso = el.dataset.iso; sel.dateLabel = el.dataset.label; sel.time = null;
      document.querySelectorAll(".date-pill").forEach(p=>p.classList.remove("active"));
      el.classList.add("active");
      curIntervals = await Rezora.getTakenIntervals(b.id, sel.dateIso);
      renderTimes(); updateSummary();
    }));

    // times (generated from hours; slots that overlap with the selected service duration are disabled)
    const hours = genTimes(b.openTime, b.closeTime, b.slotMinutes);
    function renderTimes(){
      document.getElementById("timeHint").textContent = sel.dateIso
        ? `${sel.dateLabel} için müsait saatler (seçili hizmet süresine göre dolu saatler pasiftir):`
        : "Önce bir tarih seçin.";
      const dur = selDur();
      document.getElementById("timeRow").innerHTML = hours.map(h=>{
        const free = sel.dateIso ? Rezora.slotIsFree(h, dur, curIntervals, b.closeTime) : false;
        const isBooked = sel.dateIso && !free;
        return `<button class="time-pill ${isBooked?'disabled':''} ${sel.time===h?'active':''}" data-time="${h}" ${(!sel.dateIso||isBooked)?'disabled':''}>${h}</button>`;
      }).join("");
      document.querySelectorAll(".time-pill:not(.disabled)").forEach(el=>el.addEventListener("click",()=>{
        sel.time = el.dataset.time;
        document.querySelectorAll(".time-pill").forEach(p=>p.classList.remove("active"));
        el.classList.add("active"); updateSummary();
      }));
    }
    renderTimes();

    function svcById(id){ return services.find(s=>s.id===id); }
    function updateSummary(){
      const s = svcById(sel.service);
      document.getElementById("sumSvc").textContent = s ? s.name : "—";
      document.getElementById("sumDate").textContent = sel.dateLabel || "—";
      document.getElementById("sumTime").textContent = sel.time || "—";
      document.getElementById("continueBtn").disabled = !(sel.service && sel.dateIso && sel.time);
    }

    document.getElementById("continueBtn").addEventListener("click",()=>{
      const s = svcById(sel.service);
      Store.set({
        bizId: b.id, bizName: b.name, bizCity: b.city, bizArea: b.area,
        serviceId: s.id, service: s.name, price: svcPrice(s), dur: s.dur,
        dateIso: sel.dateIso, date: sel.dateLabel, time: sel.time,
      });
      location.href = "reserve.html";
    });

    // reviews
    document.getElementById("rvSummary").innerHTML = `<span class="stars">★</span> ${b.rating} · ${b.reviews} değerlendirme`;
    const reviews = b.reviewsList || [];
    document.getElementById("reviews").innerHTML = reviews.length ? reviews.map(r=>`
      <div class="review">
        <div class="av">${r.name[0]}</div>
        <div style="flex:1">
          <div class="rv-head">
            <div><span class="rv-name">${r.name}</span> <span class="rating" style="margin-left:6px"><span class="stars">${'★'.repeat(r.stars)}</span></span></div>
            <span class="rv-date">${r.date}</span>
          </div>
          <p class="rv-text">${r.text}</p>
        </div>
      </div>`).join("") : `<p class="muted">Henüz yorum yok.</p>`;

    initReveal();
    })();
    buildFooter();
  </script>
</body>
</html>
