<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İşletmeleri Keşfet — Rezora</title>
  <meta name="description" content="Kuzey Kıbrıs'taki berber, kuaför, restoran, halı saha, veteriner ve oto servisleri keşfet ve rezervasyon yap.">
  <link rel="icon" href="assets/img/rezora-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/gate.js"></script>
</head>
<body>
  <main>
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumb">
          <a href="index.html">Ana sayfa</a> <span>›</span> <span>İşletmeler</span>
        </div>
        <h1>İşletmeleri Keşfet</h1>
        <p>Kuzey Kıbrıs'ın en iyi işletmelerinden anında randevu al.</p>

        <div style="max-width:560px;margin-top:22px" id="searchSlot"></div>
      </div>
    </section>

    <section class="section" style="padding-top:36px">
      <div class="container">
        <div class="filter-bar" id="filterBar"></div>
        <div class="flex items-center justify-between" style="margin-bottom:22px;flex-wrap:wrap;gap:12px">
          <p class="muted" id="resultCount"></p>
          <div class="flex items-center gap-8">
            <span class="muted" style="font-size:.88rem">Sırala:</span>
            <select class="input" id="sortSel" style="width:auto;padding:9px 14px;border-radius:var(--radius-full)">
              <option value="rating">En yüksek puan</option>
              <option value="reviews">En popüler</option>
              <option value="price">En uygun fiyat</option>
            </select>
          </div>
        </div>
        <div class="grid biz-grid" id="bizGrid"></div>
        <div id="empty" class="hidden center" style="padding:60px 0">
          <h3>Sonuç bulunamadı</h3>
          <p class="muted" style="margin-top:8px">Farklı bir kategori veya arama terimi dene.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    initLayout("businesses");

    const ALL_BIZ = RezoraDB.getBusinesses();
    const CITIES = Array.from(new Set(ALL_BIZ.map(b=>b.city)));
    // MVP: only Berber & Kuaför are live
    const ACTIVE_CATS = [
      {id:"all",    name:"Tümü",  icon:"grid"},
      {id:"barber", name:"Berber",icon:"scissors"},
      {id:"salon",  name:"Kuaför",icon:"sparkles"},
    ];
    const COMING_SOON = {restaurant:"Restoran", halisaha:"Halı Saha", vet:"Veteriner", auto:"Oto Servis"};

    let state = {
      cat: qparam("cat") || "all",
      q: qparam("q") || "",
      city: qparam("city") || "",
      sort: "rating",
    };

    // search box
    document.getElementById("searchSlot").innerHTML = `
      <form class="search-bar" onsubmit="applySearch(event)">
        <div class="field">${ICON.search}<input id="qText" type="text" placeholder="Berber veya kuaför ara..." value="${state.q}"></div>
        <div class="divider"></div>
        <div class="field" style="flex:0 0 auto">${ICON.pin}
          <select id="qCity">
            <option value="">Tüm şehirler</option>
            ${CITIES.map(c=>`<option ${c===state.city?'selected':''}>${c}</option>`).join("")}
          </select></div>
        <button class="btn btn-primary" type="submit">Ara</button>
      </form>`;

    // filter chips (only active categories in this MVP)
    document.getElementById("filterBar").innerHTML = ACTIVE_CATS.map(c=>`
      <button class="chip ${state.cat===c.id?'active':''}" data-cat="${c.id}">${ICON[c.icon]} ${c.name}</button>`).join("");
    document.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
      state.cat = ch.dataset.cat;
      document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      ch.classList.add("active");
      render();
    }));

    document.getElementById("sortSel").addEventListener("change", e=>{ state.sort = e.target.value; render(); });

    function applySearch(e){
      e.preventDefault();
      state.q = document.getElementById("qText").value.trim();
      state.city = document.getElementById("qCity").value;
      render();
    }

    function render(){
      const grid = document.getElementById("bizGrid");
      const empty = document.getElementById("empty");

      // coming-soon categories (not part of MVP)
      if(COMING_SOON[state.cat]){
        grid.innerHTML = "";
        document.getElementById("resultCount").textContent = "";
        empty.classList.remove("hidden");
        empty.innerHTML = `<span class="badge badge-purple" style="margin-bottom:12px"><span class="dot"></span> Çok yakında</span>
          <h3>${COMING_SOON[state.cat]} kategorisi yolda</h3>
          <p class="muted" style="margin-top:8px">Rezora şu an Berber ve Kuaför işletmeleriyle yayında. ${COMING_SOON[state.cat]} çok yakında!</p>
          <a href="businesses.html" class="btn btn-primary" style="margin-top:18px">Aktif işletmeleri gör</a>`;
        return;
      }

      let list = ALL_BIZ.slice();
      if(state.cat!=="all") list = list.filter(b=>b.category===state.cat);
      if(state.city) list = list.filter(b=>b.city===state.city);
      if(state.q){
        const q = state.q.toLowerCase();
        list = list.filter(b=>
          b.name.toLowerCase().includes(q) ||
          b.categoryName.toLowerCase().includes(q) ||
          (b.services||[]).some(s=>s.name.toLowerCase().includes(q))
        );
      }
      if(state.sort==="rating") list.sort((a,b)=>b.rating-a.rating);
      if(state.sort==="reviews") list.sort((a,b)=>b.reviews-a.reviews);
      if(state.sort==="price") list.sort((a,b)=>(RezoraDB.startingPrice(a)||1e9)-(RezoraDB.startingPrice(b)||1e9));

      document.getElementById("resultCount").textContent = `${list.length} işletme bulundu`;
      if(list.length===0){
        grid.innerHTML="";
        empty.classList.remove("hidden");
        empty.innerHTML = `<h3>Sonuç bulunamadı</h3><p class="muted" style="margin-top:8px">Farklı bir kategori veya arama terimi dene.</p>`;
        return;
      }
      empty.classList.add("hidden");
      grid.innerHTML = list.map((b,i)=>bizCard(b,i)).join("");
      initReveal();
    }

    render();
    buildFooter();
  </script>
</body>
</html>
